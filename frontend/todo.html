<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2>Your Todos</h2>
  <button id="logoutBtn" class="btn btn-danger float-end mb-3">Logout</button>

  <form id="todoForm" class="mb-3">
    <div class="input-group">
      <input type="text" id="todoText" class="form-control" placeholder="Enter new todo" required>
      <button type="submit" class="btn btn-primary">Add</button>
    </div>
  </form>

  <ul id="todoList" class="list-group"></ul>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyalrNvBIEvRs3JQIQjYpfwTnwoczvXUAzSUSZaJiGJUBgPWNQKLqUxGHvTTO4JO0wMkA/exec"; // replace with your deployed GAS URL

const token = localStorage.getItem('token');

// Block access if not logged in
if(!token){
  window.location.href = "login.html";
}

// Logout
$('#logoutBtn').click(function(){
  localStorage.removeItem('token');
  window.location.href = "login.html";
});

// Load todos
function loadTodos(){
  $.getJSON(GAS_URL, { route: "todo", action: "get", token: token }, function(res){
    if(res.success){
      $('#todoList').empty();
      res.todos.forEach(t => {
        const checked = t.status === "done" ? "checked" : "";
        $('#todoList').append(`
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <input type="checkbox" class="form-check-input me-2 toggleStatus" data-id="${t.id}" ${checked}>
            <span class="${t.status==='done'?'text-decoration-line-through':''}">${t.todo}</span>
            <button data-id="${t.id}" class="btn btn-sm btn-danger deleteBtn">Delete</button>
          </li>
        `);
      });
    } else {
      alert(res.error);
    }
  });
}

// Add todo
$('#todoForm').submit(function(e){
  e.preventDefault();
  const todo = $('#todoText').val();
  $.getJSON(GAS_URL, { route: "todo", action: "add", token, todo }, function(res){
    if(res.success){
      $('#todoText').val('');
      loadTodos();
    } else alert(res.error);
  });
});

// Delete todo
$(document).on('click', '.deleteBtn', function(){
  const id = $(this).data('id');
  $.getJSON(GAS_URL, { route: "todo", action: "delete", token, id }, function(res){
    if(res.success) loadTodos();
    else alert(res.error);
  });
});

// Toggle status
$(document).on('change', '.toggleStatus', function(){
  const id = $(this).data('id');
  const status = $(this).is(':checked') ? "done" : "pending";
  $.getJSON(GAS_URL, { route: "todo", action: "updateStatus", token, id, status }, function(res){
    if(res.success) loadTodos();
    else alert(res.error);
  });
});

// Initial load
loadTodos();
</script>

</body>
</html>
